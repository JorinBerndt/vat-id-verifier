<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blockchain Café – Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255,255,255,0.72);
      --panel-solid: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0,0,0,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.08);
      --shadow-soft: 0 10px 30px rgba(0,0,0,0.05);
      --blue: #0071e3;
      --blue-hover: #0077ed;
      --green: #34c759;
      --orange: #ff9f0a;
      --red: #ff3b30;
      --purple: #5856d6;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max-width: 860px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
              radial-gradient(circle at top left, rgba(0,113,227,0.10), transparent 22%),
              radial-gradient(circle at top right, rgba(88,86,214,0.08), transparent 18%),
              linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
      min-height: 100vh;
      padding: 28px 20px;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
    }
    .page { max-width: var(--max-width); margin: 0 auto; }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; padding-top: 12px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; letter-spacing: -0.03em; }
    .nav-right { display: flex; gap: 10px; align-items: center; }
    .nav-user { font-size: 14px; color: var(--muted); }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 40px; }
    .progress-bar-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .progress-seg {
      flex: 1; height: 5px; border-radius: 999px;
      background: rgba(0,0,0,0.09);
      transition: background 0.4s ease;
    }
    .progress-seg.done { background: var(--blue); }
    .progress-labels { display: flex; gap: 6px; }
    .progress-label { flex: 1; font-size: 11px; font-weight: 600; color: #8e8e93; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .progress-label.done { color: var(--blue); }

    /* HEADER */
    .page-title { font-size: 34px; font-weight: 750; letter-spacing: -0.03em; margin-bottom: 6px; }
    .page-sub { color: var(--muted); font-size: 16px; margin-bottom: 36px; }

    /* GRID */
    .layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; align-items: start; }

    /* CARD */
    .card {
      background: var(--panel);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.68);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: border-color 0.3s ease;
    }
    .card.done { border-color: rgba(52,199,89,0.25); }
    .card.locked { opacity: 0.5; pointer-events: none; }
    .card-head {
      padding: 22px 24px 18px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    }
    .card-head h2 { margin: 0; font-size: 20px; font-weight: 650; letter-spacing: -0.03em; }
    .card-head p { margin: 5px 0 0; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .card-body { padding: 22px 24px 24px; }
    .cards-stack { display: grid; gap: 20px; }

    /* BADGE */
    .badge {
      display: inline-flex; align-items: center;
      min-height: 28px; padding: 0 12px; border-radius: 999px;
      font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .badge-green  { background: rgba(52,199,89,0.14); color: #1a7a35; }
    .badge-gray   { background: rgba(0,0,0,0.06); color: var(--muted); }
    .badge-blue   { background: rgba(0,113,227,0.12); color: #005bb5; }
    .badge-sim    { background: rgba(255,159,10,0.15); color: #a15c00; border: 1px solid rgba(255,159,10,0.3); }

    /* SIMULATION BANNER */
    .sim-banner {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,159,10,0.08); border: 1px solid rgba(255,159,10,0.25);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
      font-size: 13px; color: #a15c00; font-weight: 500;
    }
    .sim-banner strong { font-weight: 700; }

    /* FORM */
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: 600; color: var(--muted); }
    input[type="text"], input[type="email"], input[type="password"],
    input[type="tel"], input[type="number"], select {
      width: 100%; height: 46px; border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.86);
      color: var(--text); padding: 0 14px; font-size: 14px;
      outline: none; font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    input::placeholder { color: #8e8e93; }
    input:focus, select:focus {
      border-color: rgba(0,113,227,0.45);
      box-shadow: 0 0 0 4px rgba(0,113,227,0.12);
    }
    .form-grid { display: grid; gap: 14px; }

    /* BUTTONS */
    button {
      height: 46px; border: none; border-radius: 999px;
      padding: 0 20px; font-size: 14px; font-weight: 650;
      letter-spacing: -0.01em; cursor: pointer; font-family: inherit;
      transition: transform 0.12s ease, opacity 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:hover:not(:disabled) { opacity: 0.96; }
    button:active:not(:disabled) { transform: scale(0.985); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--blue); color: #fff; box-shadow: 0 8px 20px rgba(0,113,227,0.22); }
    .btn-primary:hover:not(:disabled) { background: var(--blue-hover); }
    .btn-secondary {
      background: rgba(255,255,255,0.9); color: var(--text);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }
    .btn-danger {
      background: rgba(255,59,48,0.1); color: #c0392b;
      border: 1px solid rgba(255,59,48,0.2);
      box-shadow: none;
    }
    .btn-danger:hover:not(:disabled) { background: rgba(255,59,48,0.18); }
    .btn-full { width: 100%; }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px; border-radius: 999px;
      border: 2.5px solid rgba(0,0,0,0.1); border-top-color: var(--blue);
      animation: spin 0.75s linear infinite; flex-shrink: 0;
    }
    .spinner-white { border-color: rgba(255,255,255,0.3); border-top-color: #fff; }

    /* INFO BOXES */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-box {
      background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.06);
      border-radius: 12px; padding: 12px 14px;
    }
    .info-box .lbl { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .info-box .val { font-size: 15px; font-weight: 600; word-break: break-all; }

    /* STATUS ROWS */
    .status-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .status-row:last-child { border-bottom: none; }
    .status-row span:last-child { font-size: 14px; }

    /* ALERT BOXES */
    .alert { border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-top: 2px; }
    .alert-green  { background: rgba(52,199,89,0.08);  border: 1px solid rgba(52,199,89,0.2);  color: #1a7a35; }
    .alert-red    { background: rgba(255,59,48,0.07);  border: 1px solid rgba(255,59,48,0.2);  color: #c0392b; }
    .alert-orange { background: rgba(255,159,10,0.09); border: 1px solid rgba(255,159,10,0.25);color: #a15c00; }

    /* SUCCESS CARD */
    .success-card {
      background: rgba(0,113,227,0.07); border: 1px solid rgba(0,113,227,0.18);
      border-radius: 18px; padding: 22px; text-align: center; margin-top: 16px;
    }
    .success-card .icon { font-size: 30px; margin-bottom: 8px; }
    .success-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .success-card p { font-size: 13px; color: var(--muted); }

    /* VAT INPUT ROW */
    .vat-row { display: flex; gap: 10px; }
    .vat-row input { flex: 1; }
    .vat-row button { flex-shrink: 0; min-width: 90px; }

    /* CHECK ROW */
    .check-row { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: #1a7a35; }

    /* SAVED CARDS LIST */
    .saved-cards { display: grid; gap: 10px; margin-bottom: 16px; }
    .saved-card-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.07);
      border-radius: 14px; padding: 12px 16px; gap: 12px;
    }
    .saved-card-info { display: flex; flex-direction: column; gap: 2px; }
    .saved-card-label { font-size: 14px; font-weight: 600; }
    .saved-card-sub { font-size: 12px; color: var(--muted); }
    .btn-icon-remove {
      height: 32px; width: 32px; padding: 0; border-radius: 50%;
      background: rgba(255,59,48,0.08); color: #c0392b;
      border: 1px solid rgba(255,59,48,0.15); box-shadow: none;
      font-size: 16px; flex-shrink: 0;
    }
    .btn-icon-remove:hover:not(:disabled) { background: rgba(255,59,48,0.18); opacity: 1; }

    /* ADD CARD FORM */
    .add-card-form {
      background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.06);
      border-radius: 18px; padding: 20px; margin-top: 4px;
    }
    .add-card-form h4 { font-size: 15px; font-weight: 650; margin-bottom: 14px; }
    .card-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: var(--radius-xl); padding: 32px;
      max-width: 420px; width: calc(100% - 40px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.18);
    }
    .modal h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
    .modal p  { color: var(--muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btns button { flex: 1; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1d1d1f; color: #fff; padding: 12px 22px; border-radius: 999px;
      font-size: 14px; font-weight: 600; z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* LOGIN SCREEN */
    #loginScreen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.7); border-radius: var(--radius-xl);
      box-shadow: var(--shadow); padding: 40px 36px; width: 100%; max-width: 420px;
    }
    .login-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .login-logo span { font-weight: 750; font-size: 20px; letter-spacing: -0.03em; }
    .login-title { font-size: 28px; font-weight: 750; letter-spacing: -0.03em; text-align: center; margin-bottom: 6px; }
    .login-sub { color: var(--muted); font-size: 15px; text-align: center; margin-bottom: 28px; }
    .login-tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.05); border-radius: 999px; padding: 4px; margin-bottom: 24px; }
    .login-tab {
      flex: 1; height: 36px; border: none; border-radius: 999px;
      background: transparent; font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all 0.18s ease; box-shadow: none;
    }
    .login-tab.active { background: #fff; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .login-error { font-size: 13px; color: var(--red); min-height: 18px; text-align: center; margin-top: 4px; }
    .login-demo-hint {
      margin-top: 20px; padding: 12px 16px;
      background: rgba(0,113,227,0.06); border: 1px solid rgba(0,113,227,0.15);
      border-radius: 12px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.5;
    }
    .login-demo-hint strong { color: var(--blue); }

    /* SIDEBAR */
    .sidebar { display: grid; gap: 20px; position: sticky; top: 24px; }
    .sidebar-card {
      background: var(--panel); backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.68); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft); padding: 22px;
    }
    .sidebar-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .sidebar-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    /* RESPONSIVE */
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .info-grid { grid-template-columns: 1fr; }
      .card-row2 { grid-template-columns: 1fr; }
      .login-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- ─── LOGIN SCREEN ──────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">

      <span>Blockchain Café</span>
    </div>
    <h1 class="login-title" id="loginTitle">Welcome back</h1>
    <p class="login-sub" id="loginSub">Sign in to your account</p>

    <div class="login-tabs">
      <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="login-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form-grid">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary btn-full" onclick="handleLogin()">Login</button>
      <div class="login-error" id="loginError"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="form-grid" style="display:none;">
      <div class="field">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" autocomplete="name"/>
      </div>
      <div class="field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="regPassword">Password <span style="font-weight:400;font-size:11px;">(min. 6 characters)</span></label>
        <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn-primary btn-full" onclick="handleRegister()">Create Account</button>
      <div class="login-error" id="registerError"></div>
    </div>

    <div class="login-demo-hint">
      🔑 Demo: <strong>demo@blockchain.cafe</strong> · <strong>demo123</strong>
    </div>
  </div>
</div>

<!-- ─── DASHBOARD SCREEN ──────────────────────────────────────────── -->
<div id="dashboardScreen" style="display:none;">
  <div class="page">
    <nav>
      <div class="nav-logo">

        Blockchain Café
      </div>
      <div class="nav-right">
        <span class="nav-user" id="navUser"></span>
        <button class="btn-secondary" style="height:36px;font-size:13px;" onclick="resetDemo()">↺ Reset</button>
        <button class="btn-secondary" style="height:36px;font-size:13px;" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="progress-wrap">
      <div class="progress-bar-row" id="progressBars"></div>
      <div class="progress-labels" id="progressLabels"></div>
    </div>

    <h1 class="page-title" id="pageTitle">Onboarding</h1>
    <p class="page-sub" id="pageSub"></p>

    <div class="layout">
      <div class="cards-stack" id="stepsContainer"></div>
      <div class="sidebar">
        <div class="sidebar-card">
          <div class="sidebar-title">Your Progress</div>
          <div class="sidebar-sub" id="sidebarSub">0/5 Steps</div>
          <div id="sidebarRows"></div>
        </div>
        <div id="successBox"></div>
      </div>
    </div>
  </div>
</div>

<!-- ─── VAT MODAL ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="vatModal" onclick="if(event.target===this)closeVatModal()">
  <div class="modal">
    <h2>Verify VAT ID</h2>
    <p>Enter your EU VAT ID for live verification via EU VIES.<br>
      <span style="font-size:12px;">Format: DE + 9 digits, e.g. DE123456789 · ATU37675002</span></p>
    <div class="vat-row">
      <input type="text" id="vatModalInput" placeholder="DE123456789" oninput="clearVatResult()"
             style="text-transform:uppercase;" autocomplete="off" maxlength="14"/>
      <button class="btn-primary" id="vatCheckBtn" onclick="checkVat()">Verify</button>
    </div>
    <div id="vatModalResult" style="margin-top:14px;"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeVatModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
  // ─── STATE ───────────────────────────────────────────────────────────
  let session = null;

  const USERS_KEY = 'bc_users_v1';
  const OB_KEY    = 'bc_onboarding_v1';

  // ─── STORAGE HELPERS ─────────────────────────────────────────────────
  function getUsers() {
    try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); } catch { return {}; }
  }
  function saveUsers(u) {
    try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch { /* sandboxed */ }
  }
  function getOnboarding(email) {
    try {
      const all = JSON.parse(localStorage.getItem(OB_KEY) || '{}');
      return all[email] ? { ...defaultOb(), ...all[email] } : defaultOb();
    } catch { return defaultOb(); }
  }
  function saveOnboarding(email, ob) {
    try {
      const all = JSON.parse(localStorage.getItem(OB_KEY) || '{}');
      all[email] = ob;
      localStorage.setItem(OB_KEY, JSON.stringify(all));
    } catch { /* sandboxed */ }
  }
  function defaultOb() {
    return {
      companyName:'', address:'', contact:'', vatId:'',
      step2done:false, step3done:false, step4done:false, step5done:false,
      cardsDone:false, cards:[], showCardForm:false
    };
  }

  // ─── AUTH ─────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'grid' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'grid' : 'none';
    document.getElementById('loginTitle').textContent = tab === 'login' ? 'Welcome back' : 'Create Account';
    document.getElementById('loginSub').textContent   = tab === 'login' ? 'Sign in to your account' : 'Create your free account';
    document.getElementById('loginError').textContent    = '';
    document.getElementById('registerError').textContent = '';
  }

  function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pw    = document.getElementById('loginPassword').value;
    const err   = document.getElementById('loginError');
    err.textContent = '';
    if (!email || !pw) { err.textContent = 'Please fill in all fields.'; return; }
    const users = getUsers();
    if (!users[email] || users[email].pw !== pw) {
      err.textContent = 'Incorrect email or password.'; return;
    }
    session = { email, name: users[email].name };
    showDashboard();
  }

  function handleRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    const pw    = document.getElementById('regPassword').value;
    const err   = document.getElementById('registerError');
    err.textContent = '';
    if (!name || !email || !pw) { err.textContent = 'Please fill in all fields.'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = 'Please enter a valid email address.'; return; }
    if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
    const users = getUsers();
    if (users[email]) { err.textContent = 'This email is already registered.'; return; }
    users[email] = { name, pw };
    saveUsers(users);
    session = { email, name };
    showDashboard();
  }

  // ─── RESET ────────────────────────────────────────────────────────────
  function resetDemo() {
    if (!confirm('Reset demo data? Your onboarding progress and all cards will be deleted.')) return;
    const fresh = defaultOb();
    saveOnboarding(session.email, fresh);
    showToast('✓ Demo reset! Starting from scratch.');
    renderDashboard();
  }

  function logout() {
    session = null;
    document.getElementById('dashboardScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display     = 'flex';
  }

  // ─── DASHBOARD ────────────────────────────────────────────────────────
  function showDashboard() {
    document.getElementById('loginScreen').style.display     = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    document.getElementById('navUser').textContent = '👋 ' + session.name;
    renderDashboard();
  }

  function getOb() { return getOnboarding(session.email); }
  function saveOb(update) {
    const ob = { ...getOb(), ...update };
    saveOnboarding(session.email, ob);
    renderDashboard();
  }

  function renderDashboard() {
    const ob = getOb();
    const steps  = [true, ob.step2done, ob.step3done, ob.step4done, ob.step5done];
    const done   = steps.filter(Boolean).length;
    const allDone = steps.every(Boolean);

    document.getElementById('pageTitle').textContent = allDone ? '🎉 Onboarding Complete!' : 'Onboarding';
    document.getElementById('pageSub').textContent   = allDone
            ? 'Your company is fully verified!'
            : `${done} of 5 steps completed`;

    const labels = ['Account', 'Company', 'Identity', 'VAT ID', 'Email'];
    document.getElementById('progressBars').innerHTML = steps
            .map(d => `<div class="progress-seg ${d ? 'done' : ''}"></div>`).join('');
    document.getElementById('progressLabels').innerHTML = steps
            .map((d,i) => `<div class="progress-label ${d ? 'done' : ''}">${d ? '✓ ' : ''}${labels[i]}</div>`).join('');

    document.getElementById('sidebarSub').textContent = `${done}/5 Steps`;
    const sideItems = [
      ['Account created',       true],
      ['Company registered',    ob.step2done],
      ['Identity verified',     ob.step3done],
      ['VAT ID verified',       ob.step4done],
      ['Email confirmed',       ob.step5done],
      ['Card added',            ob.cardsDone],
    ];
    document.getElementById('sidebarRows').innerHTML = sideItems.map(([l,d]) =>
            `<div class="status-row">
      <span style="font-size:18px;">${d ? '✅' : '⏳'}</span>
      <span style="font-weight:${d?600:400};color:${d?'var(--text)':'var(--muted)'};">${l}</span>
    </div>`
    ).join('');

    document.getElementById('successBox').innerHTML = allDone
            ? `<div class="success-card">
        <div class="icon">🎉</div>
        <h3>Onboarding Complete!</h3>
        <p>Add your Payment Card!</p>
       </div>`
            : '';

    document.getElementById('stepsContainer').innerHTML =
            step1Card() +
            step2Card(ob) +
            step3Card(ob) +
            step4Card(ob) +
            step5Card(ob) +
            cardsCard(ob, allDone);
  }

  // ─── STEP CARDS ───────────────────────────────────────────────────────
  function stepWrap(num, title, sub, isDone, isLocked, inner, isSim) {
    const simBadge = isSim && !isDone ? '<span class="badge badge-sim">⚙ Simulation</span>' : '';
    const doneBadge = isDone ? '<span class="badge badge-green">✓ Completed</span>' : '';
    const lockBadge = (!isDone && isLocked) ? '<span class="badge badge-gray">🔒 Locked</span>' : '';
    return `<div class="card ${isDone?'done':''} ${isLocked?'locked':''}">
    <div class="card-head">
      <div>
        <h2>Step ${num} · ${title}</h2>
        <p>${sub}</p>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
        ${simBadge}${doneBadge}${lockBadge}
      </div>
    </div>
    <div class="card-body">${inner}</div>
  </div>`;
  }

  function step1Card() {
    return stepWrap(1, 'Account Created', 'Your personal account is active.', true, false,
            `<div class="info-grid">
      <div class="info-box"><div class="lbl">Name</div><div class="val">${esc(session.name)}</div></div>
      <div class="info-box"><div class="lbl">Email</div><div class="val">${esc(session.email)}</div></div>
    </div>`
    );
  }

  function step2Card(ob) {
    if (ob.step2done) {
      return stepWrap(2, 'Register Company', 'Company details for tax verification.', true, false,
              `<div style="display:grid;gap:10px;">
        ${[['Company', ob.companyName],['Address', ob.address],['Contact', ob.contact]].map(([l,v]) =>
                      `<div style="display:flex;justify-content:space-between;font-size:14px;gap:12px;">
            <span style="color:var(--muted);flex-shrink:0;">${l}</span><strong style="text-align:right;">${esc(v)}</strong>
          </div>`).join('')}
      </div>`
      );
    }
    return stepWrap(2, 'Register Company', 'Company details for tax verification.', false, false,
            `<div class="form-grid">
      <div class="field">
        <label for="s2name">Company Name</label>
        <input type="text" id="s2name" placeholder="Acme Corp Ltd." value="${esc(ob.companyName)}" autocomplete="organization"/>
      </div>
      <div class="field">
        <label for="s2addr">Address</label>
        <input type="text" id="s2addr" placeholder="123 Main Street, New York" value="${esc(ob.address)}" autocomplete="street-address"/>
      </div>
      <div class="field">
        <label for="s2contact">Contact Person / Phone</label>
        <input type="tel" id="s2contact" placeholder="John Doe, +1 555 …" value="${esc(ob.contact)}" autocomplete="tel"/>
      </div>
      <button class="btn-primary btn-full" onclick="submitStep2()">Register Company</button>
    </div>`
    );
  }

  function step3Card(ob) {
    const locked = !ob.step2done;
    if (ob.step3done) {
      return stepWrap(3, 'Verify Identity', 'Cross-check with company register.', true, false,
              `<div class="check-row"><span style="font-size:22px;">✓</span> Identity successfully verified. <span style="font-size:12px;color:var(--muted);font-weight:400;">— Company Register Check</span></div>`
      );
    }
    return stepWrap(3, 'Verify Identity', 'Cross-check with company register service.', false, locked,
            `<div class="sim-banner">
      <span style="font-size:16px;">⚙</span>
      <div><strong>Simulation:</strong> In the live version, a real company register API will be queried here. Currently the check is simulated.</div>
    </div>
    <button class="btn-primary" id="identityCheckBtn" onclick="startIdentityCheck()">Start Identity Check</button>`,
            true
    );
  }

  function step4Card(ob) {
    const locked = !ob.step3done;
    if (ob.step4done) {
      return stepWrap(4, 'Verify VAT ID (VIES)', 'Live verification via EU VIES.', true, false,
              `<div style="display:flex;flex-direction:column;gap:10px;">
        <div class="check-row"><span style="font-size:22px;">✓</span> VAT ID successfully verified</div>
        <div class="alert alert-green"><strong>VAT ID:</strong> ${esc(ob.vatId)}</div>
        <p style="font-size:12px;color:var(--muted);">Source: EU VIES · ec.europa.eu</p>
      </div>`
      );
    }
    return stepWrap(4, 'Verify VAT ID (VIES)', 'Live verification via EU VIES · e.g. ATU37675002', false, locked,
            `<div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-primary" onclick="openVatModal()">Verify VAT ID now</button>
      <p style="font-size:12px;color:var(--muted);">Format: DE + 9 digits · Source: EU VIES (ec.europa.eu)</p>
    </div>`
    );
  }

  function step5Card(ob) {
    const locked = !ob.step4done;
    if (ob.step5done) {
      return stepWrap(5, 'Confirm Email', 'Confirm your email address.', true, false,
              `<div class="check-row"><span style="font-size:22px;">✓</span> ${esc(session.email)} has been confirmed.</div>`
      );
    }
    return stepWrap(5, 'Confirm Email', 'Confirm your email address.', false, locked,
            `<div class="sim-banner">
      <span style="font-size:16px;">⚙</span>
      <div><strong>Simulation:</strong> In the live version, a real confirmation email will be sent. Here the click is simulated.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <p style="font-size:14px;color:var(--muted);">Confirmation link will be sent to <strong>${esc(session.email)}</strong>.</p>
      <button class="btn-primary" id="emailConfirmBtn" onclick="simulateEmailConfirm()">Send Confirmation Email</button>
    </div>`,
            true
    );
  }

  function cardsCard(ob, allDone) {
    const cards = ob.cards || [];
    const savedCardsHtml = cards.length > 0
            ? `<div class="saved-cards">${cards.map((c, i) =>
                    `<div class="saved-card-row">
          <div class="saved-card-info">
            <span class="saved-card-label">${esc(c.label)} · ${esc(c.masked)}</span>
            <span class="saved-card-sub">${esc(c.name)} · Exp: ${esc(c.expiry)}</span>
          </div>
          <button class="btn-icon-remove" onclick="removeCard(${i})" title="Remove card" aria-label="Remove card">✕</button>
        </div>`
            ).join('')}</div>` : '';

    const addFormHtml = ob.showCardForm ? `
    <div class="add-card-form">
      <h4>Add New Card</h4>
      <div class="form-grid">
        <div class="field">
          <label for="cardName">Cardholder Name</label>
          <input type="text" id="cardName" placeholder="John Doe" autocomplete="cc-name"/>
        </div>
        <div class="field">
          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19"
                 oninput="formatCardNumber(this)" autocomplete="cc-number"/>
        </div>
        <div class="card-row2">
          <div class="field">
            <label for="cardExpiry">Expiry Date</label>
            <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5"
                   oninput="formatExpiry(this)" autocomplete="cc-exp"/>
          </div>
          <div class="field">
            <label for="cardCvc">CVC</label>
            <input type="text" id="cardCvc" placeholder="123" maxlength="4"
                   autocomplete="cc-csc"/>
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted);padding:4px 0;">
          🔒 Card data is stored locally only (demo).
        </div>
        <div class="login-error" id="cardError" style="text-align:left;"></div>
        <div style="display:flex;gap:10px;">
          <button class="btn-primary" style="flex:1;" onclick="submitCard()">Save Card</button>
          <button class="btn-secondary" onclick="cancelAddCard()">Cancel</button>
        </div>
      </div>
    </div>` : '';

    const lockedStyle = !allDone ? 'opacity:0.45;pointer-events:none;' : '';
    const lockedBadge = !allDone ? '<span class="badge badge-gray">🔒 Locked</span>' : (cards.length > 0 ? '<span class="badge badge-green">✓ Active</span>' : '');

    return `<div class="card" style="${lockedStyle}">
    <div class="card-head">
      <div>
        <h2>Add Payment Card</h2>
        <p>${allDone ? 'Add a card for automatic VAT refunds.' : 'Available after completing all 5 steps.'}</p>
      </div>
      ${lockedBadge}
    </div>
    ${allDone ? `<div class="card-body">
      ${savedCardsHtml}
      ${!ob.showCardForm ? `<button class="btn-primary" onclick="showAddCard()">${cards.length > 0 ? '+ Add Another Card' : '+ Add Card'}</button>` : ''}
      ${addFormHtml}
    </div>` : ''}
  </div>`;
  }

  // ─── STEP ACTIONS ─────────────────────────────────────────────────────
  function submitStep2() {
    const name    = document.getElementById('s2name')?.value.trim();
    const address = document.getElementById('s2addr')?.value.trim();
    const contact = document.getElementById('s2contact')?.value.trim();
    if (!name || !address || !contact) { alert('Please fill in all fields.'); return; }
    saveOb({ companyName: name, address, contact, step2done: true });
    showToast('✓ Company registered!');
  }

  function startIdentityCheck() {
    const btn = document.getElementById('identityCheckBtn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-white"></span> Checking…';
    setTimeout(() => {
      saveOb({ step3done: true });
      showToast('✓ Identity verified!');
    }, 2400);
  }

  function simulateEmailConfirm() {
    const btn = document.getElementById('emailConfirmBtn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-white"></span> Sending email…';
    setTimeout(() => {
      saveOb({ step5done: true });
      showToast('✓ Email confirmed!');
    }, 1600);
  }

  function showAddCard() { saveOb({ showCardForm: true }); }
  function cancelAddCard() { saveOb({ showCardForm: false }); }

  function formatCardNumber(el) {
    let v = el.value.replace(/\D/g,'').substring(0,16);
    el.value = v.replace(/(\d{4})(?=\d)/g,'$1 ');
  }
  function formatExpiry(el) {
    let v = el.value.replace(/\D/g,'');
    if (v.length >= 3) v = v.substring(0,2) + '/' + v.substring(2,4);
    el.value = v;
  }

  function submitCard() {
    const name   = document.getElementById('cardName')?.value.trim();
    const number = document.getElementById('cardNumber')?.value.replace(/\s/g,'');
    const expiry = document.getElementById('cardExpiry')?.value.trim();
    const cvc    = document.getElementById('cardCvc')?.value.trim();
    const err    = document.getElementById('cardError');
    if (!err) return;
    err.textContent = '';
    if (!name)            { err.textContent = 'Please enter the cardholder name.'; return; }
    if (number.length < 13) { err.textContent = 'Please enter a valid card number.'; return; }
    if (!/^\d{2}\/\d{2}$/.test(expiry)) { err.textContent = 'Enter expiry date in MM/YY format.'; return; }
    if (cvc.length < 3)   { err.textContent = 'Please enter the CVC.'; return; }
    const type   = number.startsWith('4') ? 'Visa' : number.startsWith('5') ? 'Mastercard' : 'Card';
    const masked = '**** **** **** ' + number.slice(-4);
    const ob     = getOb();
    const cards  = [...(ob.cards || [])];
    cards.push({ label: type, masked, expiry, name });
    saveOb({ cards, cardsDone: true, showCardForm: false });
    showToast('✓ Card saved!');
  }

  function removeCard(index) {
    if (!confirm('Really remove this card?')) return;
    const ob    = getOb();
    const cards = [...(ob.cards || [])];
    cards.splice(index, 1);
    saveOb({ cards, cardsDone: cards.length > 0, showCardForm: false });
    showToast('Card removed.');
  }

  // ─── VAT MODAL ────────────────────────────────────────────────────────
  function openVatModal() {
    document.getElementById('vatModal').classList.add('show');
    document.getElementById('vatModalInput').value = '';
    document.getElementById('vatModalResult').innerHTML = '';
    const btn = document.getElementById('vatCheckBtn');
    btn.disabled = false;
    btn.textContent = 'Verify';
    setTimeout(() => document.getElementById('vatModalInput').focus(), 100);
  }
  function closeVatModal() { document.getElementById('vatModal').classList.remove('show'); }
  function clearVatResult() { document.getElementById('vatModalResult').innerHTML = ''; }

  async function checkVat() {
    const val = document.getElementById('vatModalInput').value.trim().toUpperCase();
    const btn = document.getElementById('vatCheckBtn');
    const res = document.getElementById('vatModalResult');
    if (!val) { res.innerHTML = '<div class="alert alert-orange">Please enter a VAT ID.</div>'; return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-white" style="width:16px;height:16px;border-width:2px;"></span>';
    res.innerHTML = '';

    try {
      const r = await fetch('http://localhost:8090/api/verify-vat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vatId: val })
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();

      if (data.valid === true) {
        res.innerHTML = `<div class="alert alert-green">
        <strong style="display:block;margin-bottom:4px;">✓ VAT ID is valid and active</strong>
        ${data.name    ? `<div><strong>Company:</strong> ${esc(data.name)}</div>` : ''}
        ${data.address ? `<div style="color:#2d7d4e;margin-top:4px;">${esc(data.address)}</div>` : ''}
      </div>
      <div style="margin-top:12px;display:flex;gap:10px;">
        <button class="btn-primary" style="flex:1;" onclick="confirmVat('${esc(val)}')">Use this VAT ID</button>
        <button class="btn-secondary" onclick="closeVatModal()">Cancel</button>
      </div>`;
      } else {
        res.innerHTML = `<div class="alert ${data.valid === false ? 'alert-red' : 'alert-orange'}">
        ${data.valid === false ? '✕' : '⚠'} ${esc(data.error || 'Unknown error')}
      </div>`;
      }
    } catch (e) {
      res.innerHTML = `<div class="alert alert-orange">
      ⚠ <strong>Backend not reachable.</strong><br>
      <span style="font-size:12px;">Start the Spring Boot server on port 8090 (vies-backend).</span>
    </div>`;
    }

    btn.disabled = false;
    btn.textContent = 'Verify';
  }

  function confirmVat(vatId) {
    closeVatModal();
    saveOb({ vatId, step4done: true });
    showToast('✓ VAT ID verified!');
  }

  // ─── TOAST ────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ─── UTILS ────────────────────────────────────────────────────────────
  function esc(v) {
    return String(v ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ─── INIT ─────────────────────────────────────────────────────────────
  (function() {
    document.getElementById('loginEmail').value    = 'demo@blockchain.cafe';
    document.getElementById('loginPassword').value = 'demo123';
    const users = getUsers();
    if (!users['demo@blockchain.cafe']) {
      users['demo@blockchain.cafe'] = { name: 'Demo User', pw: 'demo123' };
      saveUsers(users);
    }
  })();
</script>
</body>
</html>
